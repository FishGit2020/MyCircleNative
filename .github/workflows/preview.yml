name: PR Preview Build

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --maxWorkers=2

  preview-android:
    name: Preview APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build preview APK
        id: build
        run: |
          BUILD_OUTPUT=$(eas build --platform android --profile preview --non-interactive --json 2>/dev/null | tail -1)
          echo "build_url=$(echo $BUILD_OUTPUT | jq -r '.[0].buildUrl // empty')" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: steps.build.outputs.build_url
        uses: actions/github-script@v8
        with:
          script: |
            const buildUrl = '${{ steps.build.outputs.build_url }}';
            const body = [
              '## 📱 Preview Build Ready',
              '',
              `**Android APK:** [View on EAS](${buildUrl})`,
              '',
              '_Built from commit ${{ github.event.pull_request.head.sha }}_'
            ].join('\n');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Build Ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
